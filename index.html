<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conspiracy Theory Test Proof of Concept</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --disabled: #374151;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1120 0%, #111827 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1, h2 {
      margin-top: 0;
      line-height: 1.2;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s ease, transform 0.05s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background: var(--disabled);
      color: #cbd5e1;
      cursor: not-allowed;
    }

    label.checkbox {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 20px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    input[type="checkbox"] {
      transform: translateY(3px);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .pill {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.15);
      color: #bfdbfe;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .small {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 18px;
    }

    .status {
      margin-top: 16px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card" id="app"></main>

  <script>
    const app = document.getElementById('app');

    // Global state for the current participant.
    const state = {
      assignedTest: null
    };

    // This key keeps track of which test should be shown next.
    // Important note: this flip-flop only works across devices if they all use the SAME browser storage context,
    // which they will not on different phones. For a real multi-device version, you would need a database.
    const NEXT_TEST_KEY = 'ctt-next-test';

    function getNextAssignedTest() {
      const stored = localStorage.getItem(NEXT_TEST_KEY);

      // First participant on a device gets Negative Test.
      if (!stored) {
        localStorage.setItem(NEXT_TEST_KEY, 'positive');
        return 'negative';
      }

      if (stored === 'negative') {
        localStorage.setItem(NEXT_TEST_KEY, 'positive');
        return 'negative';
      }

      localStorage.setItem(NEXT_TEST_KEY, 'negative');
      return 'positive';
    }

    function render(html) {
      app.innerHTML = html;
    }

    function landingPage() {
      render(`
        <div class="pill">Proof of Concept</div>
        <h1>Conspiracy Theory Test Proof of Concept</h1>
        <p>This is a simple prototype showing the page flow for your poster-session mini experiment.</p>
        <div class="btn-row">
          <button id="continueBtn">Continue</button>
        </div>
      `);

      document.getElementById('continueBtn').addEventListener('click', consentPage);
    }

    function consentPage() {
      render(`
        <div class="pill">Consent</div>
        <h2>Informed consent information will be found here</h2>
        <p>Participants would review the consent language here before moving on.</p>

        <label class="checkbox">
          <input type="checkbox" id="consentCheck" />
          <span>I have read the consent information and agree to continue.</span>
        </label>

        <div class="btn-row">
          <button id="nextBtn" disabled>Next</button>
        </div>
        <div class="status" id="statusText">Check the box to unlock the next button.</div>
      `);

      const check = document.getElementById('consentCheck');
      const nextBtn = document.getElementById('nextBtn');
      const statusText = document.getElementById('statusText');

      check.addEventListener('change', () => {
        nextBtn.disabled = !check.checked;
        statusText.textContent = check.checked
          ? 'Next unlocked.'
          : 'Check the box to unlock the next button.';
      });

      nextBtn.addEventListener('click', () => {
        state.assignedTest = getNextAssignedTest();
        testPage();
      });
    }

    function testPage() {
      const testLabel = state.assignedTest === 'negative' ? 'Negative Test' : 'Positive Test';

      render(`
        <div class="pill">Task</div>
        <h2>${testLabel}</h2>
        <p>This is where your test or manipulation would appear.</p>
        <div class="btn-row">
          <button id="continueBtn">Continue</button>
        </div>
        <p class="small">Assigned condition: <code>${state.assignedTest}</code></p>
      `);

      document.getElementById('continueBtn').addEventListener('click', scorePage);
    }

    function scorePage() {
      const message = state.assignedTest === 'negative'
        ? 'you scored lower than 80% of other testers'
        : 'you scored higher than 90% of other testers';

      render(`
        <div class="pill">Feedback</div>
        <h2>${message}</h2>
        <p>This page represents the feedback participants would receive after the task.</p>
        <div class="btn-row">
          <button id="continueBtn">Continue</button>
        </div>
      `);

      document.getElementById('continueBtn').addEventListener('click', likertPage);
    }

    function likertPage() {
      render(`
        <div class="pill">Survey</div>
        <h2>Likert Scale Here</h2>
        <p>This is where your outcome measures would go.</p>
        <div class="btn-row">
          <button id="continueBtn">Continue</button>
        </div>
      `);

      document.getElementById('continueBtn').addEventListener('click', debriefPage);
    }

    function debriefPage() {
      render(`
        <div class="pill">Debrief</div>
        <h2>Debrief Here</h2>
        <p>This is where your debrief text would appear at the end of the study.</p>
        <div class="btn-row">
          <button id="restartBtn">Start Over</button>
        </div>
      `);

      document.getElementById('restartBtn').addEventListener('click', () => {
        state.assignedTest = null;
        landingPage();
      });
    }

    landingPage();
  </script>
</body>
</html>
